name: CI (develop) - Build, Push Image, Update Kustomize

on:
  push:
    branches: ['develop']

permissions:
  contents: write
  packages: read

concurrency:
  group: develop-cicd
  cancel-in-progress: true

env:
  IMAGE_REPO: jhjun07/jifelog-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm auth for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_ID: ${{ secrets.GH_ID }}
        run: |
          if [ -n "${GH_PACKAGES_TOKEN}" ] && [ -n "${GH_ID}" ]; then
            printf "@%s:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\nalways-auth=true\n" "${GH_ID}" "${GH_PACKAGES_TOKEN}" > ~/.npmrc
          fi

      - name: Install dependencies
        run: npm ci

      - name: Remove temporary npm auth config
        run: rm -f ~/.npmrc

      - name: Build frontend app
        run: npm run build -- --mode dev

      - name: Set image metadata
        run: |
          echo "IMAGE_TAG=dev-${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "OVERLAY_FILE=deploy/overlays/develop/kustomization.yaml" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_ID: ${{ secrets.GH_ID }}
        run: |
          docker build \
            --build-arg GH_PACKAGES_TOKEN="${GH_PACKAGES_TOKEN}" \
            --build-arg GH_ID="${GH_ID}" \
            --build-arg VITE_MODE="dev" \
            -t "${IMAGE_REPO}:${IMAGE_TAG}" \
            -t "${IMAGE_REPO}:dev-latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:dev-latest"

      - name: Update Kustomize image tag and push commit
        run: |
          sed -i "0,/newTag:/s/newTag:.*/newTag: ${IMAGE_TAG}/" "${OVERLAY_FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "${OVERLAY_FILE}"
          git commit -m "chore: dev deploy ${IMAGE_TAG}" || echo "No changes to commit"
          git push
